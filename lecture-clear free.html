<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive map of USA - Lecture Mode</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%230f172a'/><polygon points='50,15 61,41 89,41 68,57 76,84 50,67 24,84 32,57 11,41 39,41' fill='%23fbbf24'/></svg>">

    <style>
        /* =========================================
           1. ГЛОБАЛЬНІ НАЛАШТУВАННЯ ТА СКИНУТИ СТИЛІ 
           ========================================= */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            touch-action: none;
        }

        /* =========================================
           2. ОСНОВНА ПАНЕЛЬ ТА КОРПУС МАПИ
           ========================================= */
        #main-panel {
            width: 65vw;
            height: 94vh;
            position: relative;
            top: 3vh;
            background: radial-gradient(circle at 30% 50%, #1e293b 0%, #0f172a 100%);
            margin-left: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 20px;
            overflow: hidden;
            z-index: 1;
        }

        #main-map {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
            cursor: -webkit-grab;
            touch-action: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        body.is-dragging,
        body.is-dragging #main-map,
        body.is-dragging path {
            cursor: grabbing !important;
            cursor: -webkit-grabbing !important;
        }

        #click-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5000;
            display: none;
        }

        #click-blocker.active {
            display: block;
        }

        body.map-locked #main-panel,
        body.map-locked #main-map path[id] {
            pointer-events: none !important;
            cursor: default !important;
        }

        /* =========================================
           3. ГЕОМЕТРІЯ ШТАТІВ (SVG PATHS)
           ========================================= */
        #main-map path {
            fill: transparent !important;
            stroke: rgba(255, 255, 255, 0.25) !important;
            stroke-width: 1px !important;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        #main-map path[id] {
            pointer-events: all;
            cursor: pointer;
        }

        #main-map path[id]:hover {
            fill: rgba(255, 255, 255, 0.05) !important;
            stroke: rgba(255, 215, 0, 0.9) !important;
            stroke-width: 1.5px !important;
        }

        #main-map path[id].active {
            fill: rgba(255, 215, 0, 0.15) !important;
            stroke: #FFD700 !important;
            stroke-width: 2px !important;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
        }

        /* =========================================
           4. ПІДПИСИ ТА ВИНОСКИ (LABELS)
           ========================================= */
        #map-labels {
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .state-label {
            fill: rgba(255, 255, 255, 0.5);
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 0.4s ease;
            user-select: none;
            letter-spacing: 0.5px;
        }

        .leader-line {
            fill: none;
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 0.5px;
            pointer-events: none;
        }

        .leader-dot {
            fill: rgba(255, 255, 255, 0.5);
            stroke: none;
            pointer-events: none;
        }

        /* =========================================
           5. ШАР ГОЛОГРАМИ (FLYING STATES)
           ========================================= */
        #hologram-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            overflow: visible;
        }

        .fly-group {
            cursor: crosshair !important;
            pointer-events: auto !important;
            z-index: 10001 !important;
        }

        .fly-group path {
            transition: all 0.3s ease !important;
            fill: rgba(15, 23, 42, 0.95) !important;
            stroke: #22d3ee !important;
            stroke-width: 1.5px !important;
            vector-effect: non-scaling-stroke !important;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 10px rgba(0, 255, 255, 0.5)) !important;
        }

        .fly-group.hover-active path {
            stroke: #ffffff !important;
            stroke-width: 2px !important;
            filter: drop-shadow(0 25px 50px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 20px rgba(34, 211, 238, 0.9)) !important;
        }

        /* =========================================
           6. HUD ІНСПЕКТОР (ТЕКСТОВА ПАНЕЛЬ)
           ========================================= */
        .hud-container {
            position: absolute;
            right: 2vw;
            width: 28vw !important;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease 0.3s;
            z-index: 10000;
        }

        .hud-container.visible {
            opacity: 1;
        }

        #hud-top {
            position: absolute;
            top: 3% !important;
            right: 2vw;
            width: 28vw !important;
            padding-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid rgba(100, 255, 218, 0.2);
            padding-bottom: 15px;
        }

        #hud-bottom {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 300px;
            height: auto !important;
            pointer-events: none;
            z-index: 11000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .hud-header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(100, 255, 218, 0.2);
            margin-bottom: 10px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px 12px 0 0;
            pointer-events: auto;
        }

        #hud-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 0;
            color: #fbbf24;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        #hud-desc {
            display: block;
            height: auto !important;
            background: transparent;
            border: none;
            padding: 0 !important;
            box-shadow: none;
            pointer-events: none;
        }

        .hud-content-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            pointer-events: none;
        }

        .stats-panel {
            margin-top: 0 !important;
            margin-bottom: 5px !important;
            pointer-events: none;
        }

        .stat-row {
            position: relative;
            display: flex !important;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px !important;
            margin: 2px 0;
            pointer-events: auto;
            cursor: pointer;
            z-index: 11001;
            border-radius: 8px;
            transition: all 0.2s ease;
            background: rgba(15, 23, 42, 0.4);
        }

        .stat-row:hover {
            background: rgba(100, 255, 218, 0.08) !important;
            transform: translateX(4px);
            border-left: 1px solid #64ffda !important;
            padding-left: 8px !important;
            padding-right: 12px !important;
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .stat-value {
            font-size: 0.95rem;
            color: #64ffda;
            font-weight: 600;
            pointer-events: none;
        }

        .key-feature-box,
        .feature-box {
            position: relative;
            pointer-events: auto !important;
            z-index: 11001;
            margin-top: 2px !important;
            padding: 12px !important;
            background: rgba(100, 255, 218, 0.05) !important;
            border-radius: 6px;
            border-left: 3px solid #64ffda !important;
            text-align: left;
        }

        .feature-label,
        .feature-title {
            display: block;
            font-size: 0.7rem !important;
            color: #64ffda;
            font-weight: 800;
            margin-bottom: 3px !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .feature-text {
            margin: 0;
            font-size: 0.82rem !important;
            line-height: 1.25 !important;
            color: #cbd5e1;
            letter-spacing: -0.1px;
        }

        .state-index-tag {
            transform: translateY(2px);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            font-weight: 900;
            color: #64ffda;
            background: rgba(100, 255, 218, 0.1);
            border: 1px solid rgba(100, 255, 218, 0.4);
            padding: 1px 6px;
            border-radius: 4px;
            text-shadow: 0 0 8px rgba(100, 255, 218, 0.6);
            letter-spacing: 1px;
            box-shadow: inset 0 0 5px rgba(100, 255, 218, 0.2);
        }

        /* =========================================
           7. КНОПКИ КЕРУВАННЯ HUD
           ========================================= */
        #close-inspector.btn-close-hud {
            position: absolute;
            right: 0;
            top: 0;
            width: 24px !important;
            height: 24px !important;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.4);
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
            pointer-events: auto !important;
        }

        #close-inspector.btn-close-hud:hover {
            color: #fbbebe;
            border-color: #fbbebe;
            background: rgba(255, 85, 85, 0.1);
        }

        /* =========================================
           8. ПАНЕЛЬ КЕРУВАННЯ МАПОЮ (MAP CONTROLS)
           ========================================= */
        #map-controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-width: 110px;
        }

        .control-label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 1.2px;
            font-weight: 600;
            text-transform: uppercase;
            font-family: 'Exo 2', sans-serif;
        }

        .cyber-switch {
            position: relative;
            display: inline-block;
            width: 28px;
            height: 14px;
        }

        .cyber-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .cyber-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.05);
            transition: .3s;
            clip-path: polygon(15% 0, 100% 0, 100% 70%, 85% 100%, 0 100%, 0 30%);
            border: 1px solid rgba(100, 255, 218, 0.15);
        }

        .cyber-slider:before {
            position: absolute;
            content: "";
            height: 8px;
            width: 8px;
            left: 2px;
            bottom: 2px;
            background-color: rgba(100, 255, 218, 0.3);
            transition: .3s;
        }

        input:checked+.cyber-slider {
            background-color: rgba(100, 255, 218, 0.1);
            border-color: rgba(100, 255, 218, 0.4);
        }

        input:checked+.cyber-slider:before {
            transform: translateX(14px);
            background-color: #64ffda;
            box-shadow: 0 0 8px rgba(100, 255, 218, 0.5);
        }

        input:disabled+.cyber-slider {
            opacity: 0.2;
        }

        #reset-map-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 25, 47, 0.4);
            border: 1px solid rgba(100, 255, 218, 0.2);
            color: rgba(100, 255, 218, 0.6);
            border-radius: 5px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            clip-path: polygon(0 0, 100% 0, 100% 80%, 80% 100%, 0 100%);
        }

        #reset-map-btn.is-inactive {
            opacity: 0.2;
            filter: grayscale(1);
            pointer-events: none;
            border-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            transform: scale(1) !important;
        }

        #reset-map-btn:hover {
            background: rgba(100, 255, 218, 0.1);
            border-color: #64ffda;
            color: #64ffda;
            box-shadow: 0 0 10px rgba(100, 255, 218, 0.3);
            transform: scale(1.1);
        }

        /* =========================================
           9. МАРКЕРИ ТА СПЕЦЕФЕКТИ (RANK POPUPS)
           ========================================= */
        .city-target-group {
            pointer-events: none;
            z-index: 10002;
            animation: fadeInMarker 0.5s ease-out forwards;
        }

        .city-dot {
            fill: #fbbf24;
            transform: scale(1.6);
            transform-origin: center;
            transform-box: fill-box;
            filter: drop-shadow(0 0 4px #fbbf24);
            animation: scaleUp 0.3s ease-out forwards;
        }

        .city-ring {
            fill: none;
            stroke: #64ffda;
            stroke-width: 2px;
            opacity: 0;
            transform-origin: center;
            animation: pulseScan 2.5s infinite linear;
        }

        .city-label {
            fill: #ffffff;
            font-size: 14px !important;
            font-weight: 900 !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-anchor: middle;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.9));
        }

        .rank-popup-hint.global-rank-popup {
            position: fixed;
            transform: translate(-50%, 0);
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #fbbf24;
            padding: 6px 14px;
            border-radius: 4px;
            z-index: 100000 !important;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            white-space: nowrap;
            animation: popupFadeUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .rank-popup-hint.global-rank-popup.exit {
            animation: popupFadeDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
        }

        .key-feature-box.crown-feature {
            background: rgba(251, 191, 36, 0.1) !important;
            border-left: 3px solid #fbbf24 !important;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
        }

        .crown-icon {
            display: inline-block;
            filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.8));
            animation: crownFloat 2s ease-in-out infinite;
            margin-right: 5px;
        }

        /* =========================================
           10. СИСТЕМНІ ТА ДОПОМІЖНІ СТИЛІ
           ========================================= */
        #hud-desc::-webkit-scrollbar,
        #feature-list::-webkit-scrollbar {
            display: none;
        }

        #hud-desc,
        #feature-list {
            -ms-overflow-style: none;
            scrollbar-width: none;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .collapsible-hints-container,
        .collapsible-feature {
            width: 100%;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .animation-fade-in {
            animation: slideUpFade 0.4s ease-out forwards;
        }

        /* =========================================
           11. АНІМАЦІЇ (@KEYWORDS)
           ========================================= */
        @keyframes scaleUp {
            from {
                r: 0;
            }

            to {
                r: 1.5;
            }
        }

        @keyframes pulseScan {
            0% {
                r: 1.5;
                opacity: 1;
                stroke-width: 1.5px;
            }

            50% {
                r: 6;
                opacity: 0.5;
                stroke-width: 0.5px;
            }

            100% {
                r: 10;
                opacity: 0;
                stroke-width: 0px;
            }
        }

        @keyframes fadeInMarker {
            from {
                opacity: 0;
                filter: blur(10px);
            }

            to {
                opacity: 1;
                filter: blur(0);
            }
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popupFadeUp {
            from {
                opacity: 0;
                transform: translate(-50%, 15px);
            }

            to {
                opacity: 1;
                transform: translate(-50%, -100%);
            }
        }

        @keyframes popupFadeDown {
            from {
                opacity: 1;
                transform: translate(-50%, -100%);
            }

            to {
                opacity: 0;
                transform: translate(-50%, 15px);
            }
        }

        @keyframes crownFloat {

            0%,
            100% {
                transform: translateY(0) rotate(-5deg);
            }

            50% {
                transform: translateY(-3px) rotate(5deg);
            }
        }

        @keyframes hudSlideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hud-entry-animation {
            opacity: 0;
            animation-name: hudSlideUpFade;
            animation-duration: 0.5s;
            animation-timing-function: cubic-bezier(0.23, 1, 0.32, 1);
            animation-fill-mode: forwards;
        }

        /* =========================================
           12. АДАПТИВНІСТЬ
           ========================================= */
        @media (max-height: 800px) {
            #hud-title {
                font-size: 1.4rem !important;
            }

            .stat-row {
                padding: 3px 0 !important;
            }

            .feature-text {
                font-size: 0.8rem !important;
            }
        }

        /* =========================================
           13. REGIONS MODE (ЗЕЛЕНИЙ MIDWEST + ТЬМЯНА ЛЕГЕНДА)
           ========================================= */
        #main-map.regions-mode path[data-region] { fill-opacity: 1 !important; }
        
        /* Рідні кольори регіонів (для фону) */
        #main-map.regions-mode path[data-region="Northeast"] { fill: rgba(92, 201, 255, 0.25) !important; stroke: #5CC9FF !important; stroke-width: 1.5px !important; }
        #main-map.regions-mode path[data-region="Midwest"] { fill: rgba(110, 220, 127, 0.25) !important; stroke: #6EDC7F !important; stroke-width: 1.5px !important; }
        #main-map.regions-mode path[data-region="South"] { fill: rgba(255, 138, 101, 0.25) !important; stroke: #FF8A65 !important; stroke-width: 1.5px !important; }
        #main-map.regions-mode path[data-region="West"] { fill: rgba(255, 213, 79, 0.25) !important; stroke: #FFD54F !important; stroke-width: 1.5px !important; }

        /* Заблоковані регіони (Приглушені) */
        #main-map.regions-mode path.locked-state {
            fill-opacity: 0.1 !important; 
            stroke-opacity: 0.2 !important; 
            stroke-width: 1px !important;   
            filter: none !important;
        }
        #main-map.regions-mode path.locked-state:hover {
            fill-opacity: 0.15 !important; 
            stroke-opacity: 0.4 !important;
            filter: none !important;
        }

        /* 🔥 РОБОЧИЙ РЕГІОН (MIDWEST): КІБЕР-ЗЕЛЕНИЙ 🔥 */
        #main-map.regions-mode path[id]:not(.locked-state) {
            fill: rgba(100, 255, 218, 0.25) !important;  /* Зелена заливка */
            stroke: #64ffda !important;                  /* Зелений контур */
            stroke-width: 1.5px !important;
        }
        
        /* Зелений ховер для Midwest */
        #main-map.regions-mode path[id]:not(.locked-state):hover {
            fill: rgba(100, 255, 218, 0.4) !important;   
            stroke: #64ffda !important;
            stroke-width: 2px !important;
            filter: drop-shadow(0 0 8px rgba(100, 255, 218, 0.5)) !important; 
        }

        /* Зелений клік (Active) для Midwest */
        #main-map.regions-mode path.active:not(.locked-state) {
            fill: rgba(100, 255, 218, 0.6) !important;   
            stroke: #64ffda !important;
            stroke-width: 2px !important;
            filter: drop-shadow(0 0 12px rgba(100, 255, 218, 0.8)) !important;
            z-index: 5000;
        }

        /* --- ЛЕГЕНДА РЕГІОНІВ ТА ЇЇ ЛОГІКА --- */
        .regions-legend {
            position: absolute; right: 25px; bottom: 100px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
            pointer-events: none; opacity: 0; transform: translateY(10px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto !important; z-index: 12000 !important; 
        }
        .regions-legend.active { opacity: 1; transform: translateY(0); }
        
        .legend-item {
            opacity: 0.7; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; font-family: 'Exo 2', sans-serif;
            white-space: nowrap; pointer-events: auto !important; cursor: pointer; transition: all 0.3s ease;
        }

        /* 🔒 ПРИГЛУШУЄМО ЗАБЛОКОВАНІ РЯДКИ ЛЕГЕНДИ 🔒 */
        .legend-item.locked-legend {
            opacity: 0.35 !important; /* Вдвічі тьмяніші за Midwest */
        }
        .legend-item.locked-legend:hover {
            opacity: 0.65 !important; /* Трохи підсвічуємо при наведенні, щоб рука потягнулася клікнути */
        }

        .legend-item::after {
            content: ''; display: inline-block; width: 4px; height: 4px; margin-left: 10px; background: currentColor;
            box-shadow: 0 0 8px currentColor; vertical-align: middle; border-radius: 50%;
        }
        
        .legend-item.disabled { opacity: 0.3 !important; color: #657995 !important; text-decoration: line-through; text-shadow: none !important; }
        .legend-item.disabled::after { background: #657995 !important; box-shadow: none !important; }
        
        .state-off { fill: #1e293b !important; opacity: 0.15 !important; stroke: rgba(100, 255, 218, 0.05) !important; pointer-events: none !important; }
        .label-region-hidden { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; transition: opacity 0.3s ease !important; }
        /* =========================================
           14. GLOBAL ROW & CURSORS
           ========================================= */
        .global-stat-row {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            margin: 2px 0;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.4);
            pointer-events: none;
            cursor: default;
        }

        #main-map,
        .fly-group,
        .flying-region {
            cursor: grab !important;
        }

        body.is-dragging,
        body.is-dragging * {
            cursor: grabbing !important;
        }

        .fly-group,
        .flying-region {
            cursor: crosshair !important;
        }

        .flying-region:hover {
            filter: brightness(1.2) drop-shadow(0 0 10px rgba(100, 255, 218, 0.6)) !important;
            stroke: #64ffda !important;
            stroke-width: 2px !important;
        }

        body.is-dragging .flying-region {
            filter: brightness(1) !important;
            cursor: grabbing !important;
        }

        /* 1. ЗАБЛОКОВАНІ ШТАТИ (Привиди) */
        #main-map path.locked-state {
            stroke: rgba(255, 255, 255, 0.1) !important;
            /* Дуже тьмяний контур */
            stroke-width: 0.5px !important;
            /* Тонка лінія */
            cursor: pointer !important;
            /* Залишаємо клік, щоб викликати вікно PRO */
        }

        /* Вбиваємо золотий ховер для заблокованих */
        #main-map path.locked-state:hover {
            fill: transparent !important;
            stroke: rgba(255, 255, 255, 0.2) !important;
            /* Ледь-ледь світлішає при наведенні */
            stroke-width: 0.5px !important;
            filter: none !important;
        }

        /* 2. АКТИВНИЙ РЕГІОН (Живий) */
        /* Застосовуємо до всіх path, які НЕ мають класу locked-state */
        #main-map path[id]:not(.locked-state) {
            stroke: rgba(100, 255, 218, 0.4) !important;
            /* Легкий неоновий контур */
            stroke-width: 1.5px !important;
            /* Товстіша лінія */
            fill: rgba(100, 255, 218, 0.03) !important;
            /* Мікро-заливка для об'єму */
        }

        /* =========================================
           15. FREEBIE MODE (БАЗОВИЙ РЕЖИМ)
           ========================================= */
        /* Заблоковані (Привиди) */
        #main-map path.locked-state {
            stroke: rgba(255, 255, 255, 0.15) !important;
            stroke-width: 0.5px !important;
            fill: transparent !important;
            cursor: pointer !important;
            filter: none !important;
        }

        #main-map path.locked-state:hover {
            fill: rgba(255, 255, 255, 0.02) !important;
            stroke: rgba(255, 255, 255, 0.3) !important;
            stroke-width: 0.5px !important;
            filter: none !important;
        }

        /* 🟡 РОБОЧИЙ РЕГІОН: БАЗОВИЙ РЕЖИМ 🟡 */
        /* Прозорі з неоновим контуром */
        #main-map:not(.regions-mode) path[id]:not(.locked-state) {
            fill: transparent !important;
            stroke: rgba(100, 255, 218, 0.5) !important;
            stroke-width: 1px !important;
            filter: none !important;
        }

        /* Золотий ховер */
        #main-map:not(.regions-mode) path[id]:not(.locked-state):hover {
            fill: rgba(255, 215, 0, 0.15) !important;
            stroke: #FFD700 !important;
            stroke-width: 1.5px !important;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.6)) !important;
        }

        /* Золотий клік (Active) */
        #main-map:not(.regions-mode) path.active:not(.locked-state) {
            fill: rgba(255, 215, 0, 0.25) !important;
            stroke: #FFD700 !important;
            stroke-width: 2px !important;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.8)) !important;
        }

        /* Тьмяні підписи для заблокованих штатів */
        .state-label.locked-label,
        .leader-line.locked-label,
        .leader-dot.locked-label {
            opacity: 0.25 !important;
        }

        /* --- СТИЛІ МОДАЛЬНОГО ВІКНА --- */
        #pro-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #pro-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        #pro-modal .modal-content {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.98), rgba(15, 23, 42, 1));
            border: 1px solid #fbbf24;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            max-width: 360px;
            width: 85%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 25px rgba(251, 191, 36, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #pro-modal.active .modal-content {
            transform: scale(1);
        }

        .pro-btn-upgrade {
            background: #fbbf24;
            color: #000;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            font-weight: 900;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
        }

        .pro-btn-upgrade:hover {
            background: #facc15;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.5);
        }

        .pro-btn-upgrade:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(251, 191, 36, 0.3);
        }

        .pro-btn-cancel {
            margin-top: 10px;
            width: 100%;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            padding: 12px;
            font-weight: 700;
            font-size: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pro-btn-cancel:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .pro-btn-cancel:active {
            transform: scale(0.97);
        }
    </style>
</head>

        const FREE_REGION = 'Midwest'; // Вказуємо безкоштовний регіон

        function updateResetButtonState() {
            const btn = document.getElementById('reset-map-btn');
            if (!btn) return;
            const isDefault = currentScale === 1 && Math.abs(currentTranslateX) < 0.1 && Math.abs(currentTranslateY) < 0.1;
            isDefault ? btn.classList.add('is-inactive') : btn.classList.remove('is-inactive');
        }

        function updateTransform() {
            const mapGroup = document.querySelector('#main-map g');
            if (mapGroup) mapGroup.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
            updateResetButtonState();
        }

        function toggleStateNames(isVisible) {
            const map = document.getElementById('main-map');
            const labelsLayer = document.getElementById('map-labels');
            if (!labelsLayer || !map) return;
            map.classList.toggle('show-labels', isVisible);
            labelsLayer.style.opacity = isVisible ? '1' : '0';
            labelsLayer.style.pointerEvents = isVisible ? 'auto' : 'none';
            updateLabelsVisibility();
        }

        const USA_GLOBAL_STATS = {
            title: "United States of America", region: "North America", statesCount: "50 States + DC",
            area: "3,796,742", population: "333M", feature: "The world's third-largest country by land area and population, a federal republic with the world's largest economy."
        };

        function showGlobalStats() {
            const titleEl = document.getElementById('hud-title');
            const descEl = document.getElementById('hud-desc');
            const closeBtn = document.getElementById('close-inspector');

            if (closeBtn) closeBtn.style.display = 'none';
            if (titleEl) titleEl.innerHTML = `USA`;
            if (descEl) {
                descEl.innerHTML = `
                    <div class="hud-content-container">
                        <div class="stats-panel hud-entry-animation">
                            <div class="global-stat-row">
                                <span class="stat-label">TOTAL STATES:</span><strong class="stat-value">${USA_GLOBAL_STATS.statesCount}</strong>
                            </div>
                            <div class="global-stat-row">
                                <span class="stat-label">TOTAL AREA:</span><strong class="stat-value">${USA_GLOBAL_STATS.area} sq mi</strong>
                            </div>
                            <div class="global-stat-row">
                                <span class="stat-label">TOTAL POPULATION:</span><strong class="stat-value">${USA_GLOBAL_STATS.population}</strong>
                            </div>
                        </div>
                        <div class="key-feature-box hud-entry-animation" style="border-color: #64ffda; margin-top: 15px;">
                            <span class="feature-title">🌐 NATIONAL OVERVIEW:</span>
                            <p class="feature-text">${USA_GLOBAL_STATS.feature}</p>
                        </div>
                        <p style="color: #64ffda; font-size: 0.7rem; text-align: center; margin-top: 20px; opacity: 0.8;">
                            SELECT A STATE ON THE MAP TO BEGIN INSPECTION
                        </p>
                    </div>
                `;
            }
            document.getElementById('hud-top')?.classList.add('visible');
            document.getElementById('hud-bottom')?.classList.add('visible');
        }

        let cachedStartCoords = { x: 0, y: 0 };

        document.addEventListener('DOMContentLoaded', () => {
            window.addEventListener('resize', () => { if (activeFlyGroup && activeRegionId) realignHologram(); });
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && activeFlyGroup) animateExit(); });

            // 🔥 Ініціалізація SVG без fetch (ОФЛАЙН РЕЖИМ)
            const template = document.getElementById('map-svg-template');
            const svgElement = template.content.querySelector('svg');

            const mainSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            mainSvg.id = 'main-map';
            mainSvg.setAttribute('viewBox', svgElement.getAttribute('viewBox') || "0 0 958.7 592.8");

            const mapGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            mapGroup.id = 'map-content';


            const paths = svgElement.querySelectorAll('path');
            paths.forEach(path => {
                const regionId = path.id;
                const data = USA_STATES[regionId];
                if (data) {
                    const newPath = path.cloneNode(true);
                    newPath.setAttribute('data-region', data.region || 'Default');

                    // 🔥 ЛОГІКА FREEBIE: Вішаємо "замок", якщо це не Захід
                    const isLocked = data.region !== FREE_REGION;
                    if (isLocked) {
                        newPath.classList.add('locked-state');
                    }

                    newPath.addEventListener('click', (e) => {
                        // Якщо штат під замком - показуємо модалку і блокуємо політ
                        if (isLocked) {
                            document.getElementById('pro-modal').classList.add('active');
                            return;
                        }

                        const oldContainer = document.querySelector('#hud-desc .hud-content-container');
                        const hudTitle = document.getElementById('hud-title');

                        if (oldContainer) {
                            oldContainer.style.transition = 'opacity 0.1s ease';
                            oldContainer.style.opacity = '0';
                        }

                        if (hudTitle) {
                            if (hudTitle.innerText.trim() === 'USA') {
                                hudTitle.style.transition = 'opacity 0.1s ease';
                                hudTitle.style.opacity = '0';
                            } else {
                                hudTitle.style.transition = 'none';
                                hudTitle.style.opacity = '1';
                            }
                        }

                        if (typeof isDraggingMap !== 'undefined' && isDraggingMap) return;
                        document.querySelectorAll('#main-map path').forEach(p => p.classList.remove('active'));
                        newPath.classList.add('active');
                        if (typeof spawnHologram === 'function') spawnHologram(newPath, regionId);

                    mapGroup.appendChild(newPath);

            });

            const labelsGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");

                mainPanel.appendChild(mainSvg);
                renderMapLabels();

                const toggle = document.getElementById('toggle-names');
                if (toggle) toggleStateNames(toggle.checked);

                if (typeof enableZoomAndPan === 'function') enableZoomAndPan(mainSvg, mapGroup);

        // --- ЛОГІКА ПОЛЬОТУ ---
        function spawnHologram(originalPath, id) {
            const hologramLayer = document.getElementById('hologram-layer');
            const clickBlocker = document.getElementById('click-blocker');
            const data = USA_STATES[id];
            if (!data) return;

            activeData = data; activeRegionId = id; clickBlocker.classList.add('active'); toggleHud(false);

            const desiredScale = data.customScale * 2.6 || 2.6;
            const relativeEndScale = desiredScale / currentScale;

            hologramLayer.innerHTML = '';
            const clone = originalPath.cloneNode(true);
            clone.classList.add('flying-region'); clone.classList.remove('active');

            const matrix = originalPath.getScreenCTM();
            const rect = originalPath.getBoundingClientRect();

            const flyGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            flyGroup.classList.add('fly-group'); flyGroup.style.pointerEvents = "auto";
            activeFlyGroup = flyGroup;

            clone.style.transform = `matrix(${matrix.a}, ${matrix.b}, ${matrix.c}, ${matrix.d}, ${matrix.e}, ${matrix.f})`;
            clone.style.transformOrigin = "0 0";

            flyGroup.appendChild(clone); hologramLayer.appendChild(flyGroup);

            cachedStartCoords = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            const coords = calculateTargetCoordinates();
            flyGroup.style.transformOrigin = `${cachedStartCoords.x}px ${cachedStartCoords.y}px`;

            const animation = flyGroup.animate([
                { transform: `translate(0px, 0px) scale(1) rotateY(0deg)`, opacity: 0.8 },
                { transform: `translate(${coords.deltaX}px, ${coords.deltaY}px) scale(${relativeEndScale}) rotateY(-15deg)`, opacity: 1 }
            ], { duration: 800, easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.275)', fill: 'forwards' });

            animation.onfinish = () => {
                flyGroup.style.transform = `translate(${coords.deltaX}px, ${coords.deltaY}px) scale(${relativeEndScale}) rotateY(-15deg)`;

                const titleEl = document.getElementById('hud-title');
                if (titleEl) {
                    titleEl.innerHTML = `${data.title.toUpperCase()} <span class="state-index-tag">${id}</span>`;
                    titleEl.style.transition = 'opacity 0.3s ease'; titleEl.style.opacity = '1';
                }

                const desc = document.getElementById('hud-desc');
                if (desc) {
                    desc.innerHTML = '<p style="color: #64ffda; padding-top:20px;">☝️ Tap state to locate capital</p>';
                    const oldContainer = document.querySelector('#hud-desc .hud-content-container');
                    if (oldContainer) oldContainer.style.opacity = '1';
                }

                const closeBtn = document.getElementById('close-inspector');
                if (closeBtn) closeBtn.style.display = '';

                toggleHud(true); clickStep = 0;
                enableSwipeToDismiss(flyGroup, coords.deltaX, coords.deltaY, relativeEndScale, data, id);
            };
        }

        function calculateTargetCoordinates() {
            const hudElement = document.getElementById('hud-bottom') || document.querySelector('.hud-container');
            const targetCenterX = hudElement ? hudElement.getBoundingClientRect().left + (hudElement.getBoundingClientRect().width / 2) : window.innerWidth * 0.75;
            const targetCenterY = window.innerHeight * 0.34 + 35;
            return { deltaX: targetCenterX - cachedStartCoords.x, deltaY: targetCenterY - cachedStartCoords.y };
        }

        function handleStepLogic(data, id) {
            const hudDesc = document.getElementById('hud-desc');
            if (!hudDesc) return;

            if (clickStep === 0) {
                showCityMarker(activeFlyGroup, activeFlyGroup.querySelector('path'), data);
                hudDesc.innerHTML = `<div class="hud-entry-animation" style="text-align:center; padding:15px; margin-top: auto;">
                    <span class="stat-label" style="display:block;margin-bottom:5px;">CAPITAL CITY</span>
                    <strong class="stat-value" style="font-size:1.5rem;display:block;color:#fff;">${data.capital}</strong>
                    <div style="margin-top:10px;font-size:1.1rem;display:flex;align-items:center;justify-content:center;gap:8px;">
                        <span>👥</span><span style="color:#64ffda;font-weight:bold;">${data.capPop}</span>
                    </div>
                    <p style="color:#fbbf24;font-size:0.8rem;margin-top:15px;letter-spacing:1px;animation:pulse 2s infinite;">☝️ TAP STATE TO SCAN STATISTICS</p>
                </div>`;
                clickStep = 1;
            } else if (clickStep === 1) {
                hudDesc.innerHTML = `<div class="hud-content-container">
                    <div class="stats-panel hud-entry-animation" style="margin-top: auto !important;">
                        <div class="stat-row" onclick="showRankPopup(this,'Admission Rank','\#${data.rankJoin}')">
                            <span class="stat-label">ADMITTED TO THE UNION:</span><strong class="stat-value">${data.admissionYear}</strong>
                        </div>
                        <div class="stat-row" onclick="showRankPopup(this,'Area Rank','\#${data.rankArea}')">
                            <span class="stat-label">AREA:</span><strong class="stat-value">${data.area} sq mi</strong>
                        </div>
                        <div class="stat-row" onclick="showRankPopup(this,'Population Rank','\#${data.rankPop}')">
                            <span class="stat-label">POPULATION:</span><strong class="stat-value">${data.population}</strong>
                        </div>
                    </div>
                    <div id="hints-zone" class="collapsible-hints-container hud-entry-animation">
                        <p style="color: #fbbf24; font-size: 0.7rem; margin: 12px 0 4px 0; opacity: 0.8; text-align: center;">🔍 TAP ROWS TO SEE RANKINGS</p>
                        <p style="color: #64ffda; font-size: 0.75rem; font-weight: bold; margin: 0; text-align: center; animation: pulse 2s infinite;">☝️ TAP STATE FOR UNIQUE FEATURE</p>
                    </div>
                </div>`;
                clickStep = 2;
            } else if (clickStep === 2) {
                const hintsZone = document.getElementById('hints-zone');
                const container = document.querySelector('.hud-content-container');

                if (hintsZone && container) {
                    hintsZone.style.opacity = '0'; hintsZone.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => {
                        hintsZone.remove();
                        const isSpecialRank = data.rankJoin === 1 || data.rankJoin === 50 || data.rankArea === 1 || data.rankArea === 50 || data.rankPop === 1 || data.rankPop === 50;
                        const crownIcon = isSpecialRank ? '👑 ' : '';
                        const featureBox = document.createElement('div');
                        featureBox.className = `key-feature-box hud-entry-animation ${isSpecialRank ? 'crown-feature' : ''}`;
                        featureBox.innerHTML = `<span class="feature-title">${crownIcon}💡 UNIQUE FEATURE:</span><p class="feature-text">${data.feature}</p>`;
                        container.appendChild(featureBox);
                    }, 300);
                }
                clickStep = 3;
            }
        }

        function enableSwipeToDismiss(element, baseX, baseY, scale, data, id) {
            let startX = 0; let currentX = 0; let isDraggingItem = false;

            const onStart = (x) => { startX = x; currentX = x; isDraggingItem = true; element.style.transition = 'none'; };
            const onMove = (x) => {
                if (!isDraggingItem) return;
                currentX = x; const diff = currentX - startX;
                if (Math.abs(diff) > 5) document.body.classList.add('is-dragging');
                element.style.transform = `translate(${baseX + diff}px, ${baseY}px) scale(${scale}) rotateY(${-15 + (diff * 0.05)}deg)`;
            };
            const onEnd = () => {
                if (!isDraggingItem) return;
                isDraggingItem = false; document.body.classList.remove('is-dragging'); element.style.cursor = 'grab';
                const diff = currentX - startX;
                if (Math.abs(diff) < 10) {
                    if (Date.now() - lastClickTime < 300) return;
                    lastClickTime = Date.now(); handleStepLogic(data, id); return;
                }
                if (Math.abs(diff) > 100) {
                    document.querySelectorAll('.city-target-group, .rank-popup-hint').forEach(el => el.remove());
                    if (diff > 0) {
                        element.animate([
                            { transform: element.style.transform, opacity: 1 },
                            { transform: `translate(${baseX + 1000}px, ${baseY}px) scale(${scale})`, opacity: 0 }
                        ], { duration: 400, easing: 'ease-in', fill: 'forwards' }).onfinish = () => fullCleanup();
                    } else { animateExit(); }
                } else {
                    element.style.transition = 'transform 0.3s ease-out';
                    element.style.transform = `translate(${baseX}px, ${baseY}px) scale(${scale}) rotateY(-15deg)`;
                }
            };
            element.addEventListener('mousedown', (e) => { e.stopPropagation(); onStart(e.clientX); });
            element.addEventListener('touchstart', (e) => { e.stopPropagation(); onStart(e.touches[0].clientX); }, { passive: true });
            window.addEventListener('mousemove', (e) => { if (isDraggingItem) onMove(e.clientX); });
            window.addEventListener('touchmove', (e) => { if (isDraggingItem) onMove(e.touches[0].clientX); }, { passive: true });
            window.addEventListener('mouseup', onEnd); window.addEventListener('touchend', onEnd);
        }

        function toggleHud(visible) {
            document.getElementById('hud-top')?.classList.toggle('visible', visible);
            document.getElementById('hud-bottom')?.classList.toggle('visible', visible);
        }

        function fullCleanup() {
            activeFlyGroup = null; clickStep = 0;
            document.getElementById('click-blocker')?.classList.remove('active');
            document.querySelectorAll('#main-map path.active').forEach(p => p.classList.remove('active'));
            showGlobalStats();
            document.querySelectorAll('.city-target-group').forEach(m => m.remove());
            document.getElementById('hologram-layer').innerHTML = '';
        }

        function animateExit() {
            if (!activeFlyGroup) return;
            document.querySelectorAll('.city-target-group, .rank-popup-hint').forEach(el => el.remove());
            toggleHud(false);
            activeFlyGroup.animate([{ transform: activeFlyGroup.style.transform, opacity: 1 }, { transform: `translate(0px, 0px) scale(1) rotateY(0deg)`, opacity: 0 }], { duration: 500, easing: 'ease-in', fill: 'forwards' }).onfinish = () => fullCleanup();
        }

        // --- ZOOM & PAN ---
        function enableZoomAndPan(svgElement, targetGroup) {
            let isPanning = false; let startX = 0, startY = 0; let mouseMovedTotal = 0; const dragThreshold = 5;
            let initialTouchDist = 0, initialScale = 1, initialMidpoint = { x: 0, y: 0 }, initialTranslate = { x: 0, y: 0 };

            svgElement.addEventListener('wheel', (e) => {
                e.preventDefault();
                const factor = Math.pow(1.1, -e.deltaY / 100);
                const newScale = Math.min(Math.max(currentScale * factor, 0.4), 10);
                const rect = svgElement.getBoundingClientRect();
                const mouseX = e.clientX - rect.left, mouseY = e.clientY - rect.top;
                const scaleRatio = newScale / currentScale;
                currentTranslateX = mouseX - (mouseX - currentTranslateX) * scaleRatio;
                currentTranslateY = mouseY - (mouseY - currentTranslateY) * scaleRatio;
                currentScale = newScale; updateTransform();
            }, { passive: false });

            svgElement.addEventListener('mousedown', (e) => { isPanning = true; isDraggingMap = false; mouseMovedTotal = 0; startX = e.clientX - currentTranslateX; startY = e.clientY - currentTranslateY; });
            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                const dx = e.clientX - (startX + currentTranslateX), dy = e.clientY - (startY + currentTranslateY);
                mouseMovedTotal += Math.sqrt(dx * dx + dy * dy);
                if (mouseMovedTotal > dragThreshold) isDraggingMap = true;
                currentTranslateX = e.clientX - startX; currentTranslateY = e.clientY - startY;
                document.body.classList.add('is-dragging'); updateTransform();
            });

            svgElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) { isPanning = true; isDraggingMap = false; startX = e.touches[0].clientX - currentTranslateX; startY = e.touches[0].clientY - currentTranslateY; }
                else if (e.touches.length === 2) { isPanning = false; initialTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialScale = currentScale; initialMidpoint = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 }; initialTranslate = { x: currentTranslateX, y: currentTranslateY }; }
            }, { passive: false });

            window.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && isPanning) { isDraggingMap = true; currentTranslateX = e.touches[0].clientX - startX; currentTranslateY = e.touches[0].clientY - startY; updateTransform(); }
                else if (e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    const mid = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
                    const newScale = Math.min(Math.max(initialScale * (dist / initialTouchDist), 0.4), 10);
                    const ratio = newScale / initialScale;
                    currentTranslateX = mid.x - (initialMidpoint.x - initialTranslate.x) * ratio;
                    currentTranslateY = mid.y - (initialMidpoint.y - initialTranslate.y) * ratio;
                    currentScale = newScale; updateTransform();
                }
            }, { passive: false });

            const end = () => { isPanning = false; setTimeout(() => { isDraggingMap = false; }, 50); };
            window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
        }

        function realignHologram() {
            if (!activeFlyGroup || !activeRegionId) return;
            const coords = calculateTargetCoordinates();
            const endScale = activeData.customScale || 2.6;
            activeFlyGroup.style.transformOrigin = `${cachedStartCoords.x}px ${cachedStartCoords.y}px`;
            activeFlyGroup.style.transition = 'none';
            activeFlyGroup.style.transform = `translate(${coords.deltaX}px, ${coords.deltaY}px) scale(${endScale}) rotateY(-15deg)`;
            enableSwipeToDismiss(activeFlyGroup, coords.deltaX, coords.deltaY, endScale, activeData, activeRegionId);
        }

        function showCityMarker(flyGroup, pathElement, data) {
            if (document.querySelector('.city-target-group')) return;
            const pathRect = pathElement.getBoundingClientRect(), layerRect = document.getElementById('hologram-layer').getBoundingClientRect();
            const centerX = (pathRect.left + pathRect.width / 2) - layerRect.left, centerY = (pathRect.top + pathRect.height / 2) - layerRect.top;
            const dx = (pathRect.width * (data.capDX || 0)) / 100, dy = (pathRect.height * (data.capDY || 0)) / 100;
            const markerGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
            markerGroup.classList.add('city-target-group');
            markerGroup.setAttribute("transform", `translate(${centerX + dx}, ${centerY + dy})`);
            const ring = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            ring.setAttribute("r", "24"); ring.setAttribute("fill", "none"); ring.setAttribute("stroke", "#64ffda"); ring.classList.add('city-ring');
            const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            dot.setAttribute("r", "4"); dot.setAttribute("fill", "#64ffda"); dot.classList.add('city-dot');
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("y", "-30"); text.setAttribute("text-anchor", "middle"); text.classList.add('city-label');
            text.textContent = data.capital;
            markerGroup.appendChild(ring); markerGroup.appendChild(dot); markerGroup.appendChild(text);
            document.getElementById('hologram-layer').appendChild(markerGroup);
        }

        window.showRankPopup = function (element, label, value) {
            document.querySelectorAll('.rank-popup-hint').forEach(p => p.remove());
            const rect = element.getBoundingClientRect(), popup = document.createElement('div');
            popup.className = 'rank-popup-hint global-rank-popup';
            popup.innerHTML = `<span style="color: rgba(255,255,255,0.6); font-size: 0.7rem;">${label}</span><strong style="color: #fbbf24; font-size: 1rem; margin-left: 10px;">${value}</strong>`;
            document.body.appendChild(popup);
            popup.style.left = `${rect.left + rect.width / 2}px`; popup.style.top = `${rect.top - 10}px`;
            setTimeout(() => { if (document.body.contains(popup)) { popup.classList.add('exit'); setTimeout(() => popup.remove(), 300); } }, 4000);
        };

        // --- МІТКИ (LABELS) ---
        function renderMapLabels() {
            const labelsLayer = document.getElementById('map-labels');
            if (!labelsLayer) return;
            labelsLayer.innerHTML = '';
            const baseFontSize = 8;

            for (const [id, data] of Object.entries(USA_STATES)) {
                if (!data.labelPos) continue;
                if (data.leaderStart) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", data.leaderStart.x); line.setAttribute("y1", data.leaderStart.y);
                    line.setAttribute("x2", data.labelPos.x); line.setAttribute("y2", data.labelPos.y);
                    line.setAttribute("class", "leader-line"); line.setAttribute("data-region", data.region || 'Default');
                    labelsLayer.appendChild(line);

                    const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    dot.setAttribute("cx", data.leaderStart.x); dot.setAttribute("cy", data.leaderStart.y);
                    dot.setAttribute("r", "1"); dot.setAttribute("class", "leader-dot"); dot.setAttribute("data-region", data.region || 'Default');
                    labelsLayer.appendChild(dot);
                }

                const textNode = document.createElementNS("http://www.w3.org/2000/svg", "text");
                textNode.setAttribute("x", data.labelPos.x); textNode.setAttribute("y", data.labelPos.y);
                textNode.setAttribute("class", "state-label"); textNode.setAttribute("data-region", data.region || 'Default');

                let anchor = "middle", dx = "0";
                if (data.leaderStart) {
                    if (data.labelPos.x > data.leaderStart.x) { anchor = "start"; dx = "5"; } else { anchor = "end"; dx = "-5"; }
                }
                textNode.setAttribute("text-anchor", anchor); textNode.setAttribute("dx", dx);
                textNode.style.fontSize = `${baseFontSize * (data.labelFontScale || 1)}px`;

                if (data.customLabel) {
                    const lines = data.customLabel.split('|');
                    lines.forEach((line, index) => {
                        const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                        tspan.textContent = line; tspan.setAttribute("x", data.labelPos.x); tspan.setAttribute("dx", dx);
                        tspan.setAttribute("dy", index === 0 ? (lines.length > 1 ? "-0.4em" : "0.3em") : "1.1em");
                        textNode.appendChild(tspan);
                    });
                } else {
                    textNode.setAttribute("dominant-baseline", "middle"); textNode.textContent = data.title;
                }

                // Робимо підписи тьмяними для заблокованих штатів
                if (data.region !== FREE_REGION) {
                    if (data.leaderStart) {
                        labelsLayer.lastChild.previousSibling.classList.add('locked-label');
                        labelsLayer.lastChild.classList.add('locked-label');
                    }
                    textNode.classList.add('locked-label');
                }
                labelsLayer.appendChild(textNode);
            }
        }

        const resetBtn = document.getElementById('reset-map-btn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                const mapGroup = document.querySelector('#main-map g');
                mapGroup.style.transition = "transform 1.2s cubic-bezier(0.23, 1, 0.32, 1)";
                currentScale = 1; currentTranslateX = 0; currentTranslateY = 0;
                updateTransform(); setTimeout(() => { mapGroup.style.transition = "none"; }, 1200);
            });
        }

        // --- РЕГІОНИ ТА ЛЕГЕНДА ---
        window.toggleRegions = function (isActive) {
            const map = document.getElementById('main-map');
            const legend = document.getElementById('regions-legend');
            if (!map) return;

            if (isActive) {
                map.classList.add('regions-mode');
                if (legend) legend.classList.add('active');
            } else {
                map.classList.remove('regions-mode');
                if (legend) legend.classList.remove('active');
                document.querySelectorAll('#main-map path').forEach(state => {
                    state.classList.remove('state-off'); state.style.opacity = '1';
                });
                document.querySelectorAll('.label-region-hidden').forEach(label => label.classList.remove('label-region-hidden'));
                if (legend) legend.querySelectorAll('.legend-item').forEach(item => item.classList.remove('disabled'));
            }
            updateLabelsVisibility();
        }

function setupLegendInteractivity() {
            document.addEventListener('mouseover', (e) => {
                const item = e.target.closest('.legend-item');
                const map = document.getElementById('main-map');
                if (!item || !map || !map.classList.contains('regions-mode') || item.classList.contains('disabled')) return;
                
                // Ховер працює для всіх: чистимо текст від спецсимволів
                const regionName = item.textContent.replace('🔒', '').replace('(FREE)', '').trim().toLowerCase();
                
                document.querySelectorAll('#main-map path').forEach(state => {
                    const rawAttr = state.getAttribute('data-region');
                    if (rawAttr) state.style.opacity = (rawAttr.trim().toLowerCase() === regionName) ? '1' : '0.15';
                });
            });

            document.addEventListener('mouseout', (e) => {
                if (e.target.closest('.legend-item')) {
                    document.querySelectorAll('#main-map path').forEach(s => s.style.opacity = '1');
                }
            });

            document.addEventListener('click', (e) => {
                const item = e.target.closest('.legend-item');
                if (!item) return;

                // 🔥 БРОНЕБІЙНИЙ КАПКАН: Перевіряємо наявність символу "🔒" або класу
                if (item.classList.contains('locked-legend') || item.textContent.includes('🔒')) {
                    const modal = document.getElementById('pro-modal');
                    if (modal) modal.classList.add('active');
                    return; // Зупиняємо виконання, нічого не перемикаємо
                }

                const map = document.getElementById('main-map');
                if (!map || !map.classList.contains('regions-mode')) return;

                // Логіка перемикання кольорів (працює ТІЛЬКИ для Midwest)
                const allItems = Array.from(document.querySelectorAll('.legend-item')).filter(i => !i.textContent.includes('🔒'));
                const activeBefore = allItems.filter(i => !i.classList.contains('disabled'));
                
                if (activeBefore.length === allItems.length) {
                    allItems.forEach(i => { if (i !== item) i.classList.add('disabled'); });
                } else if (activeBefore.length === 1 && !item.classList.contains('disabled')) {
                    allItems.forEach(i => i.classList.remove('disabled'));
                } else { 
                    item.classList.toggle('disabled'); 
                }

                const currentDisabled = allItems.filter(i => i.classList.contains('disabled'))
                    .map(i => i.textContent.replace('🔒', '').replace('(FREE)', '').trim().toLowerCase());
                
                document.querySelectorAll('#main-map path').forEach(state => {
                    const reg = state.getAttribute('data-region')?.toLowerCase();
                    if (reg && !state.classList.contains('locked-state')) {
                        state.classList.toggle('state-off', currentDisabled.includes(reg));
                    }
                });
                
                if(typeof updateLabelsVisibility === 'function') updateLabelsVisibility();
            });
        }

        setupLegendInteractivity();

        function updateLabelsVisibility() {
            const map = document.getElementById('main-map');
            if (!map) return;
            const namesGloballyOn = map.classList.contains('show-labels');
            const isRegionsMode = map.classList.contains('regions-mode');
            const disabledRegions = Array.from(document.querySelectorAll('.legend-item.disabled'))
                .map(i => i.textContent.replace('•', '').trim().toLowerCase());

            document.querySelectorAll('.state-index-tag, .state-label, .leader-line, .leader-dot').forEach(el => {
                const reg = el.getAttribute('data-region')?.toLowerCase();
                let shouldHide = !namesGloballyOn || (isRegionsMode && disabledRegions.includes(reg));
                el.classList.toggle('label-region-hidden', shouldHide);
            });
        }

        window.toggleStateNames = toggleStateNames;
        window.animateExit = animateExit;

        window.addEventListener('mouseup', () => { document.body.classList.remove('is-dragging'); });
        window.addEventListener('touchend', () => { document.body.classList.remove('is-dragging'); });
    </script>
